<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DR.CPS — redirecting…</title>
    <script type="text/javascript">
      // GitHub Pages SPA fallback. When someone lands on any path under
      // /CPS-Clinic/foo/bar, GitHub serves this 404.html. We redirect back to
      // /CPS-Clinic/?/foo/bar and let index.html's decoder restore the URL
      // before React Router mounts. Based on rafgraph/spa-github-pages.
      //
      // pathSegmentsToKeep = 1 because the repo is served under one subpath
      // segment (/CPS-Clinic/). Set to 0 for user-page sites (user.github.io).
      (function () {
        var pathSegmentsToKeep = 1;
        var l = window.location;
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
