# Netlify deploy config. Enables:
#   - Vite build served from /dist
#   - Client-side routing via SPA fallback
#   - Long cache on hashed assets, no-cache on the HTML entry
#   - Base path forced to "/" (overrides the GitHub Pages default of
#     "/CPS-Clinic/" in vite.config.js)

[build]
  command  = "npm run build"
  publish  = "dist"

[build.environment]
  # vite.config.js: `const base = process.env.VITE_BASE ?? '/CPS-Clinic/'`
  VITE_BASE   = "/"
  # Full origin the sitemap generator embeds in <loc> tags.
  SITE_ORIGIN = "https://drcps.clinic"

# React Router / SPA fallback — every unknown path should serve index.html
# so client-side routing can resolve it. `/admin` is served by Decap and
# must be exempt (it already ships as public/admin/index.html).
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Hashed asset files (JS, CSS, images emitted by Vite) never change once
# built — cache them aggressively.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML entry must revalidate every request so users pick up new deploys
# without a hard refresh.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Decap CMS admin page ships as a plain HTML file; treat it the same
# as index.html (needs to revalidate on each visit).
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
