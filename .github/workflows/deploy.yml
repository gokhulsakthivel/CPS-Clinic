name: Deploy to GitHub Pages

on:
  push:
    branches: [main, newUI]
  workflow_dispatch:

# Only allow one concurrent deploy; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_BASE: /CPS-Clinic/

      # GitHub Pages 404s if there's no 404.html at the site root; Vite copies
      # /public/404.html into dist/ automatically, so nothing extra to do.

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
